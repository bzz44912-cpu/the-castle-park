<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | The Castle Park</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #121212;
            --accent-gold: #c5a059;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --border: #222222;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Background animated blur */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-gold), #8e6d31);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 1.5rem;
            color: #1a1a1a;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #loading {
            display: none;
            margin-top: 20px;
            color: var(--accent-gold);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="login-card">
        <div class="logo-box">🏰</div>
        <h1>The Castle Park</h1>
        <p>Administration de Luxe - Connexion</p>

        <button onclick="loginWithGoogle()" style="
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: white;
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        ">
            <img src="https://www.google.com/favicon.ico" width="20" height="20">
            Se connecter avec Google
        </button>

        <div id="loading">Redirection vers Google...</div>

        <div class="footer-text">Accès réservé au personnel autorisé</div>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loginWithGoogle() {
            document.getElementById('loading').style.display = 'block';
            
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/admin-dashboard-v2.html'
                }
            });

            if (error) {
                console.error("Erreur:", error.message);
                alert("Erreur: " + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Vérifier la session au chargement
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = '/admin';
            }
        }
        checkSession();
    </script>
</body>
</html>
